<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Career Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand,
        .nav-link,
        .nav-link.active {
            color: white !important;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        .table-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0d6efd;
            font-weight: bold;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in-out forwards;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-primary,
        .btn-danger {
            border-radius: 20px;
        }

        .pagination .page-link {
            border-radius: 50px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Career Guidance</a>
            <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon bg-light rounded"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin-dashboard">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/show_users">User Data</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/show_prediction">Prediction Data</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link text-white">Welcome, {{ admin_username }}</span>
                    </li>
                    <li class="nav-item">
                        <a href="/logout" class="btn btn-danger ms-2">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Table and content -->
    <div class="container my-5">
        <div class="table-container fade-in">
            <h1 class="mb-4">Login Users</h1>
            <table class="table table-hover table-bordered text-center">
                <thead class="table-primary">
                    <tr>
                        <th>Sr.No</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ user.username }}</td>
                        <td>{{ user.email }}</td>
                        
                        <td>
                            <a href="{{ url_for('edit_user', user_id=user.id) }}" class="btn btn-sm btn-primary">Edit</a>
                            <a href="{{ url_for('delete_user', user_id=user.id) }}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Are you sure you want to delete this user?');">Delete</a>
                        </td>
                        
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <!-- Pagination -->
            <nav>
                <ul class="pagination justify-content-center mt-4">
                    <li class="page-item disabled" id="prevPage">
                        <a class="page-link" href="#" tabindex="-1">Previous</a>
                    </li>
                    <li class="page-item" id="nextPage">
                        <a class="page-link" href="#">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- Bootstrap + Pagination Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const rows = document.querySelectorAll("tbody tr");
            const itemsPerPage = 10;
            let currentPage = 1;

            function showPage(page) {
                rows.forEach((row, index) => {
                    row.style.display = (index >= (page - 1) * itemsPerPage && index < page * itemsPerPage) ? "" : "none";
                });
            }

            function updateButtons() {
                document.getElementById("prevPage").classList.toggle("disabled", currentPage === 1);
                document.getElementById("nextPage").classList.toggle("disabled", currentPage === Math.ceil(rows.length / itemsPerPage));
            }

            function goToPage(page) {
                if (page < 1 || page > Math.ceil(rows.length / itemsPerPage)) return;
                currentPage = page;
                showPage(currentPage);
                updateButtons();
            }

            document.getElementById("prevPage").addEventListener("click", () => goToPage(currentPage - 1));
            document.getElementById("nextPage").addEventListener("click", () => goToPage(currentPage + 1));

            showPage(currentPage);
            updateButtons();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
