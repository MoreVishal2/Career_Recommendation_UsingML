<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Counselling</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        /* Global Styles */
        body {
            background-color: #f0f8ff; /* Light background color */
            font-family: Arial, sans-serif;
        }

        /* Navbar Styles */
        .navbar {
            background-color: #2c3e50 !important;
            padding: 15px 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }

        .navbar-brand {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ecf0f1 !important;
        }

        .navbar-nav .nav-item {
            margin-left: 15px;
        }

        .navbar-nav .nav-link {
            font-size: 1.1rem;
            color: #ecf0f1 !important;
            padding: 10px 20px;
            border-radius: 20px;
            transition: background-color 0.3s;
        }

        .navbar-nav .nav-link:hover {
            background-color: #3498db !important;
        }

        /* Header and Cards Layout */
        .container {
            margin-top: 50px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            transition: transform 0.3s ease-in-out;
        }

        /* Hover effect on cards */
        .card:hover {
            transform: translateY(-10px);
        }

        .card-header {
            font-weight: bold;
            font-size: 1.3rem;
            text-align: center;
            color: #fff;
        }

        .card-body {
            text-align: center;
        }

        .card-title {
            font-size: 2.2rem;
            color: #3498db;
        }

        .card-text {
            font-size: 1.1rem;
            color: #7f8c8d;
        }

        /* Responsive Layout */
        @media (max-width: 768px) {
            .card {
                margin-bottom: 15px;
            }

            .navbar-brand {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar with Logo and Menu Items -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Career Counselling</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin-dashboard">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/show_users">User Data</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/show_prediction">Prediction Data</a>
                    </li>
                </ul>
                <ul class="navbar-nav justify-content-end">
                  
                    &nbsp;
                    <li class="nav-item ">
                        <a href="/logout" class="nav-link">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="container">
        <div class="row">
            <!-- User Card -->
            <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
                <div class="card bg-light">
                    <div class="card-header bg-primary">
                        Number of Users
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">{{ num_students }}</h5>
                        <p class="card-text">Users in the database</p>
                    </div>
                </div>
            </div>
            <!-- Admin Card -->
            <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
                <div class="card bg-light">
                    <div class="card-header bg-success">
                        Number of Admins
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">{{ num_admins }}</h5>
                        <p class="card-text">Admins in the database</p>
                    </div>
                </div>
            </div>
            <!-- Prediction Card -->
            <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
                <div class="card bg-light">
                    <div class="card-header bg-warning">
                        Number of Predictions
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">{{ num_predictions }}</h5>
                        <p class="card-text">Total Number of Predictions</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
