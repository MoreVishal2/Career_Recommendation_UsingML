<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Career Recommendation System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Gradient Navbar */
        .navbar {
            background: linear-gradient(90deg, #007cf0, #00dfd8);
            padding: 0.7rem 1rem;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.7rem;
            color: #fff !important;
        }

        .nav-link {
            font-size: 1rem;
            color: #fff !important;
            margin-right: 15px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #000 !important;
            background-color: #ffffffc2;
            border-radius: 8px;
            padding: 6px 12px;
        }

        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('static/images/img2.jpg') center/cover no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #f0f0f0;
            margin-bottom: 25px;
        }

        .btn-custom {
            background-color: #00dfd8;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #000;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #007cf0;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">Career Counselling</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login">User Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin-login">Admin Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div>
            <h1>Student Career Counselling System</h1>
            <p>Our intelligent system helps students identify the best career path using academic data and interests.</p>
            <p>Start your journey towards a successful future now!</p>
            <a href="#" class="btn btn-custom">Get Started</a>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
